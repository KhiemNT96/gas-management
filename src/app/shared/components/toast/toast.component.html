<div class="toast-container" *ngIf="toast">
      <div class="toast" [ngClass]="toast!.type">
        <span class="toast-icon">
          @switch (toast!.type) {
            @case ('success') { <span class="material-icons">check_circle</span> }
            @case ('error') { <span class="material-icons">error</span> }
            @case ('warning') { <span class="material-icons">warning</span> }
            @default { <span class="material-icons">info</span> }
          }
        </span>
        <span class="toast-message">{{ toast!.message }}</span>
        <button class="toast-close" (click)="dismiss()">
          <span class="material-icons">close</span>
        </button>
      </div>
    </div>
