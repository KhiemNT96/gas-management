<div class="delivery-container">
      <h2 class="page-title">Giao gas</h2>

      <div class="search-box">
        <span class="material-icons search-icon">search</span>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          (input)="onSearch()"
          placeholder="Nhập tên hoặc SĐT khách hàng..."
          class="search-input"
        />
      </div>

      <div class="quick-actions">
        <button mat-raised-button color="accent" routerLink="/orders/new" class="action-btn">
          <span class="material-icons">add_shopping_cart</span>
          <span>Tạo đơn mới</span>
        </button>
      </div>

      <div class="results" *ngIf="searchQuery">
        <div class="customer-card" *ngFor="let customer of searchResults$ | async"
          (click)="selectCustomer(customer)">
          <div class="customer-avatar">
            <span class="material-icons">person</span>
          </div>
          <div class="customer-info">
            <span class="customer-name">{{ customer.name }}</span>
            <span class="customer-phone">{{ customer.phone }}</span>
            <span class="customer-address">{{ customer.address }}</span>
            <span class="customer-note" *ngIf="customer.note">📍 {{ customer.note }}</span>
          </div>
          <div class="customer-debt" *ngIf="customer.currentDebt > 0">
            <span class="debt-label">Nợ:</span>
            <span class="debt-amount">{{ customer.currentDebt | currency:'VND':'symbol':'1.0-0' }}</span>
          </div>
        </div>
      </div>

      <div class="no-data" *ngIf="searchQuery && (searchResults$ | async)?.length === 0">
        Không tìm thấy khách hàng
      </div>
    </div>
